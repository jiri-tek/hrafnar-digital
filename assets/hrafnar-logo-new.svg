<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hrafnar Digital - Professional Mark
       Geometric raven in profile with Norse compass/data motifs
       Dark Premium aesthetic - same family as Guides, distinct identity -->
  <defs>
    <style>
      .hd-primary { stroke: currentColor; fill: none; }
      .hd-accent { fill: currentColor; }
    </style>
  </defs>

  <g class="hd-primary" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main raven silhouette - strong geometric profile -->
    <!-- Head and beak -->
    <path d="M 45 18 L 52 16 L 54 20 L 50 22 Z"/>
    <!-- Body curve -->
    <path d="M 45 18 C 42 18, 38 20, 36 24 C 34 28, 33 34, 34 40 C 35 44, 38 47, 42 48"/>
    <!-- Wing - layered feathers -->
    <path d="M 38 28 L 18 32 L 16 30"/>
    <path d="M 36 34 L 12 38 L 10 36"/>
    <path d="M 36 40 L 14 44 L 12 42"/>
    <!-- Tail -->
    <path d="M 42 48 L 38 54 L 36 52"/>
    <path d="M 42 48 L 44 56 L 42 54"/>

    <!-- Eye - the "Insight" motif -->
    <circle cx="46" cy="21" r="1.8" class="hd-accent" stroke="none"/>

    <!-- Norse compass points - "Navigation/Data" motif -->
    <!-- Cardinal directions forming subtle vegvísir echo -->
    <g opacity="0.7" stroke-width="1.8">
      <!-- North -->
      <path d="M 32 8 L 32 4"/>
      <path d="M 30 7 L 32 4 L 34 7"/>
      <!-- East -->
      <path d="M 56 32 L 60 32"/>
      <path d="M 57 30 L 60 32 L 57 34"/>
      <!-- South -->
      <path d="M 32 56 L 32 60"/>
      <!-- West -->
      <path d="M 8 32 L 4 32"/>
    </g>

    <!-- Data signal dots - modern tech element -->
    <g class="hd-accent" stroke="none" opacity="0.8">
      <circle cx="24" cy="24" r="1.2"/>
      <circle cx="28" cy="18" r="1"/>
      <circle cx="20" cy="20" r="0.8"/>
    </g>
  </g>
</svg>
