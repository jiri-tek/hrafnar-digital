<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal geometric raven -->
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Simple curved body line -->
    <path d="M 34 16 Q 30 14, 26 16 Q 22 18, 20 24 Q 19 28, 20 32" fill="none"/>

    <!-- Beak -->
    <path d="M 34 16 L 38 14" fill="none"/>

    <!-- Wing - two simple strokes -->
    <path d="M 24 22 L 14 20" opacity="0.7"/>
    <path d="M 22 26 L 12 26" opacity="0.6"/>

    <!-- Tail -->
    <path d="M 20 32 L 16 36" opacity="0.6"/>

    <!-- Eye -->
    <circle cx="32" cy="17" r="1.5" fill="currentColor" stroke="none"/>
  </g>
</svg>
