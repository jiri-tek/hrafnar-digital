<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ultra minimal raven - flying shape -->
  <g stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
    <!-- Body - simple vertical line -->
    <path d="M 24 16 L 24 32"/>

    <!-- Wings - V shape -->
    <path d="M 24 22 L 12 18"/>
    <path d="M 24 22 L 36 18"/>

    <!-- Head accent -->
    <circle cx="24" cy="16" r="2.5" fill="currentColor" stroke="none"/>

    <!-- Tail feathers - small lines -->
    <g opacity="0.6" stroke-width="2">
      <path d="M 22 32 L 20 36"/>
      <path d="M 24 32 L 24 36"/>
      <path d="M 26 32 L 28 36"/>
    </g>
  </g>
</svg>
