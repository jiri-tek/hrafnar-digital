<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalistický obrys havrana + runické značky -->

  <!-- Havran - jen obrys, velmi čistý -->
  <g stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Hlava a zobák -->
    <circle cx="40" cy="24" r="6"/>
    <path d="M 45 22 L 50 20"/>

    <!-- Tělo -->
    <path d="M 38 30 Q 34 32, 32 36 Q 30 42, 32 46"/>

    <!-- Křídlo -->
    <path d="M 34 34 Q 26 36, 20 38"/>
    <path d="M 33 38 Q 24 40, 18 42"/>

    <!-- Ocas -->
    <path d="M 32 46 L 28 52"/>
    <path d="M 32 46 L 34 52"/>

    <!-- Oko -->
    <circle cx="41" cy="24" r="1.2" fill="currentColor" stroke="none"/>
  </g>

  <!-- Vegvísir styl - kompasové značky -->
  <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.35">
    <!-- 8 směrů -->
    <path d="M 32 8 L 32 14"/>
    <path d="M 50 14 L 46 18"/>
    <path d="M 56 32 L 50 32"/>
    <path d="M 50 50 L 46 46"/>
    <path d="M 32 56 L 32 50"/>
    <path d="M 14 50 L 18 46"/>
    <path d="M 8 32 L 14 32"/>
    <path d="M 14 14 L 18 18"/>

    <!-- Hlavní směr - sever -->
    <g stroke-width="2.2" opacity="1">
      <path d="M 29 10 L 32 8 L 35 10"/>
    </g>
  </g>
</svg>
